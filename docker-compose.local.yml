# Local and VPS overrides.
#
# Keep docker-compose.yml safe for reverse-proxy platforms such as Coolify.
# Add this file when you want the dashboard exposed directly on the host.
services:
  app:
    ports:
      - '${DEBUGPHP_HOST_PORT:-8787}:80'
    volumes:
      - ./:/var/www/html:cached
      - vendor:/var/www/html/vendor
      - data:/var/www/html/data
    working_dir: /var/www/html
    networks:
      - debugphp

  network-joiner:
    image: docker:cli
    container_name: debugphp-network-joiner
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c '
      echo "[joiner] starting auto-join loop...";
      while true; do
        for net in $$(docker network ls --format "{{.Name}}" | grep -Ev "^(bridge|host|none|debugphp)$$"); do
          if ! docker network inspect "$$net" --format "{{range .Containers}}{{.Name}} {{end}}" | grep -q "debugphp-server"; then
            docker network connect "$$net" debugphp-server 2>/dev/null && echo "[joiner] joined $$net" || true;
          fi;
        done;
        sleep 10;
      done
      '

volumes:
  vendor:
  data:

networks:
  debugphp:
    name: debugphp
