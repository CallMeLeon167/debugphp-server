services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    user: root
    ports:
      - '8080:8080'
    environment:
      STORAGE_PATH: /var/www/html/data
      SESSION_LIFETIME_HOURS: '24'
    volumes:
      - ./:/var/www/html:cached
      - vendor:/var/www/html/vendor
      - data:/var/www/html/data
    working_dir: /var/www/html

volumes:
  vendor:
  data:
