name: 💡 Feature Request
description: Suggest a new feature or improvement.
title: "[Feature] "
labels: [ "enhancement", "needs triage" ]

body:
  - type: markdown
    attributes:
      value: |
        Have an idea that would make the DebugPHP server better? Describe it below.
        Please check the existing issues first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point behind this request. What are you trying to do that's currently not possible or inconvenient?
      placeholder: "e.g. When debugging large arrays, the dashboard truncates the output and I can't see deeply nested values."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific as you can — UI changes, new API endpoints, configuration options, etc.
      placeholder: "e.g. Add a configurable MAX_DEPTH env variable that controls how deep the PHP dump renderer goes."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Have you found any workarounds or other approaches that could solve the same problem?
    validations:
      required: false

  - type: dropdown
    id: breaking
    attributes:
      label: Would this be a breaking change?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, links to similar features in other tools, or anything else that helps illustrate the idea.
    validations:
      required: false